services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: fnm
      POSTGRES_PASSWORD: fnm_dev_password
      POSTGRES_DB: freelancenearme
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fnm -d freelancenearme"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
